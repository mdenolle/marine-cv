# yaml-language-server: $schema=https://raw.githubusercontent.com/rendercv/rendercv/refs/tags/v2.5/schema.json
#
# TEMPLATE: copy this file to your-cv-docs/ and rename it.
# Edit each section file separately (employment.yaml, education.yaml, etc.)
# Run: pixi run -- rendercv render your-cv-docs/Your_Name_CV.yaml

# ==============================================================================
# CV CONTENT
# ==============================================================================
cv:
  name: Your Full Name
  headline: Your Title, Department, Institution
  location: City, State
  email: you@institution.edu
  website: https://yourwebsite.edu/        # personal or lab site
  social_networks:
    - network: GitHub
      username: your-github-username
    - network: ORCID
      username: 0000-0000-0000-0000
    - network: Google Scholar
      username: YOUR_SCHOLAR_ID             # from scholar.google.com URL param ?user=
    # - network: LinkedIn
    #   username: yourprofile
    # - network: YouTube
    #   username: your-channel-handle

  sections:
    # ── Auto-computed from scripts/update_cv_stats.py ──────────────────────
    research_impact_summary: !include research_impact_summary.yaml

    # ── Core academic sections ──────────────────────────────────────────────
    education: !include education.yaml
    employment: !include employment.yaml

    # ── Teaching & Mentoring ────────────────────────────────────────────────
    # teaching: !include teaching.yaml
    # phd_advisees: !include phd_advisees.yaml
    # postdocs: !include postdocs.yaml

    # ── Publications ────────────────────────────────────────────────────────
    # Generated by: python scripts/generate_publications.py > publications_section.yaml
    publications: !include publications_section.yaml

    # ── Grants & Service ────────────────────────────────────────────────────
    # grants: !include grant_support.yaml
    # university_service: !include university_service.yaml

    # ── Research Products ───────────────────────────────────────────────────
    # software: !include software.yaml
    # datasets: !include datasets.yaml

    # ── Talks ───────────────────────────────────────────────────────────────
    # invited_talks: !include invited_talks.yaml

# ==============================================================================
# DESIGN — adjust colors, fonts, and layout
# ==============================================================================
design:
  theme: moderncv    # classic | moderncv | sb2nov | engineeringresumes
  page:
    size: us-letter  # us-letter | a4
    top_margin: 0.7in
    bottom_margin: 0.7in
    left_margin: 0.5in
    right_margin: 0.7in
  colors:
    name: rgb(128, 0, 0)               # your name (dark red)
    section_titles: rgb(69, 128, 179)  # section headers (blue)
    connections: rgb(0, 0, 0)          # contact info
    links: rgb(0, 79, 144)             # hyperlinks
  typography:
    font_family:
      body: 'Libertinus Serif'
      section_titles: 'Open Sans'
    font_size:
      body: 10pt
      section_titles: 1.4em
  templates:
    publication_entry:
      main_column: "AUTHORS (DATE). **TITLE**. JOURNAL_WITH_DOI\nMEDIA_COVERAGE"
      date_and_location_column: "DATE"

locale:
  language: english

settings:
  current_date: '2026-01-01'   # update when rendering
