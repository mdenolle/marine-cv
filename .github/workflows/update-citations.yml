name: Update Citation Counts (OpenAlex)

concurrency:
  group: citations-main
  cancel-in-progress: false

on:
  schedule:
    # Run monthly on the 1st at 2am UTC
    - cron: '0 2 1 * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-citations:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install requests fuzzywuzzy python-Levenshtein bibtexparser ruamel.yaml
      
      - name: Fetch citations
        run: |
          python scripts/fetch_citations.py --force-refresh
      
      - name: Update CV with metrics
        run: |
          python scripts/update_cv_citations.py
      
      - name: Commit and push if changed
        id: commit
        run: |
          set -euo pipefail

          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          git fetch origin main
          git rebase origin/main

          git add marine-cv-docs/citation_cache.json marine-cv-docs/research_impact_summary.yaml
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "Update citation counts and metrics [automated]"

          if ! git push origin HEAD:main; then
            git fetch origin main
            git rebase origin/main
            git push origin HEAD:main
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

  render-cv:
    needs: update-citations
    uses: ./.github/workflows/deploy-cv.yaml
