name: Render and Deploy CV

on:
  push:
    branches: [main]
    paths:
      - "marine-cv-docs/**"
      - "src/rendercv/**"
      - ".github/workflows/deploy-cv.yaml"
  workflow_dispatch:  # manual trigger

permissions:
  contents: write

jobs:
  render:
    name: Render CV to PDF/HTML
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install project dependencies
        run: uv sync --frozen --all-extras

      - name: Render CV
        run: |
          uv run --frozen rendercv render marine-cv-docs/Marine_Denolle_CV.yaml

      - name: Commit rendered output if changed
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add marine-cv-docs/rendercv_output/
          git diff --staged --quiet || (
            git commit -m "chore: render CV [automated]" && git push
          )
