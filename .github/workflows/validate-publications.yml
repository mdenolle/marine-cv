name: Validate Publications Pipeline

on:
  push:
    paths:
      - marine-cv-docs/denolle-pub.bib
      - marine-cv-docs/citation_cache.json
      - scripts/generate_publications.py
      - src/rendercv/bibtex_parser.py
      - tests/scripts/test_generate_publications.py
      - .github/workflows/validate-publications.yml
  pull_request:
    paths:
      - marine-cv-docs/denolle-pub.bib
      - marine-cv-docs/citation_cache.json
      - scripts/generate_publications.py
      - src/rendercv/bibtex_parser.py
      - tests/scripts/test_generate_publications.py
      - .github/workflows/validate-publications.yml
  workflow_dispatch:

jobs:
  validate-publications:
    name: Validate BibTeX generation (cache-only)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Install project dependencies
        run: uv sync --frozen --all-extras

      - name: Run publication generator tests
        run: uv run --frozen pytest tests/scripts/test_generate_publications.py -q

      - name: Regenerate publications section from BibTeX
        run: |
          uv run --frozen python scripts/generate_publications.py > marine-cv-docs/publications_section.yaml

      - name: Verify generated publications_section.yaml is valid YAML array
        run: |
          uv run --frozen python - <<'PY'
          from pathlib import Path
          import yaml

          path = Path("marine-cv-docs/publications_section.yaml")
          data = yaml.safe_load(path.read_text(encoding="utf-8"))
          assert isinstance(data, list), "publications_section.yaml must be a YAML list"
          assert len(data) > 0, "publications_section.yaml should not be empty"
          required = {"title", "authors", "journal", "date"}
          missing = required - set(data[0].keys())
          assert not missing, f"first publication missing fields: {sorted(missing)}"
          print(f"Validated {len(data)} publications")
          PY

      - name: Ensure no placeholder DOI or URL values
        run: |
          if grep -qE "(doi: XX|url: https://doi\.org/XX)" marine-cv-docs/publications_section.yaml; then
            echo "Found placeholder DOI/URL values in publications_section.yaml."
            exit 1
          fi

      # On push to main: auto-commit so the file is always up-to-date.
      - name: Commit regenerated publications if changed (push)
        if: github.event_name != 'pull_request'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add marine-cv-docs/publications_section.yaml
          git diff --staged --quiet || (git commit -m "chore: regenerate publications_section.yaml [automated]" && git push)

      # On PRs: block merge if the file is stale so the author commits it.
      - name: Ensure publications_section.yaml is up-to-date (PR check)
        if: github.event_name == 'pull_request'
        run: |
          git diff --exit-code -- marine-cv-docs/publications_section.yaml || {
            echo "ERROR: publications_section.yaml is out of date."
            echo "Run: python scripts/generate_publications.py > marine-cv-docs/publications_section.yaml"
            echo "Then commit and push the updated file."
            exit 1
          }
