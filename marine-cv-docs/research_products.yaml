- institution: 'Global Seismic Phase Database'
  area: 'Dataset'
  date: 2025
  summary: 'Global seismic data product from cloud-scale waveform processing. [DOI](https://doi.org/10.26443/seismica.v4i2.1738).'
  highlights:
    - 'Scale: 4.3 billion phase picks from 1.3 PB of continuous seismic data.'
