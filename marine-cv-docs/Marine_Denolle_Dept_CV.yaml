# yaml-language-server: $schema=https://raw.githubusercontent.com/rendercv/rendercv/refs/tags/v2.5/schema.json

# ==============================================================================
# DEPARTMENT CV — College of Environment (FAR / Tenure Review Format)
#
# Generated by: python scripts/generate_dept_sections.py
# Then rendered: rendercv render marine-cv-docs/Marine_Denolle_Dept_CV.yaml
#
# Format requirements:
#   - Full cumulative CV (all items included)
#   - All items listed in reverse chronological order (most recent first)
#   - Items active or completed in the last 3 years are sorted to the top (no text labels)
# ==============================================================================

cv:
  name: Marine A. Denolle
  headline: >-
    Associate Professor, Earth and Space Sciences, University of Washington |
    College of Environment CV — reverse chronological order; active/completed 2023–present appear first
  location: Seattle, WA
  email: mdenolle@uw.edu
  phone:
  website: https://www.denolle.ai
  social_networks:
    - network: GitHub
      username: mdenolle
    - network: GitHub
      username: Denolle-Lab
    - network: ORCID
      username: 0000-0002-1610-2250
    - network: Google Scholar
      username: GR8BOxsAAAAJ
    - network: YouTube
      username: scoped6259
    - network: YouTube
      username: uwgeophysics6888
  custom_connections:
    - fontawesome_icon: flask
      placeholder: denolle-lab.github.io
      url: https://denolle-lab.github.io/

  sections:
    # First include establishes dept_cv_sections as base for subsequent includes
    education: !include dept_cv_sections/education.yaml

    research_impact_summary: !include research_impact_summary.yaml

    # Phase 1: Core Academic Sections
    employment: !include employment.yaml

    # Phase 2: Recognition & Awards
    awards: !include awards.yaml

    # Phase 3: Teaching/Mentoring
    teaching: !include teaching.yaml

    phd_advisees: !include phd_advisees.yaml

    postdocs: !include postdocs.yaml

    other_graduate_student_supervision: !include other_graduate_student_supervision.yaml

    graduate_student_committees: !include graduate_student_committees.yaml

    international_phd_advising: !include international_phd_dissertation_readers.yaml

  # Phase 4: Media Coverage & Outreach
    media_coverage:
      - bullet: '[2025 Global-scale Database of Seismic Phases](https://youtu.be/Q6Gt0-S_9WA?si=pz6REZqXWsolYXjc)'
      - bullet: '[2024 Ambient Field Monitoring in the Shallow Crust](https://youtu.be/oG4_MrOfums?si=bw6AwACloHAjqTU1)'
      - bullet: '[2024 Making Big Data Look Small](https://youtu.be/nZ2qozO0VVs?si=pPCX3nAduKDX8GGJ)'
      - bullet: '[2023 UW eScience Seminar](https://youtu.be/iRJliquttKg?si=NgscKZLTdOZ0cE9K)'
      - bullet: '[2023 Open Science in Seismology](https://youtu.be/WeZ2vJxBuTg?si=hNuIRAPEjxtYAsJG)'
      - bullet: '[2023 UW News Fiber Sensing](https://youtu.be/ff-AJRic0HY?si=Lnzyw0Ih7K87lLw7)'
      - bullet: '[2018 Radcliffe Seminar: Where we stand in Earthquake Prediction](https://youtu.be/-1GbSmiOt70?si=OExw9eGY7pMXEP67)'

    undergraduate_students: !include undergraduate_students.yaml

  # Phase 5: Service & Leadership
    training_workshops: !include training_schools.yaml
    university_service: !include university_service.yaml
    professional_service: !include committee_service.yaml
    review_panels: !include review_panels.yaml
    editorial_service: !include editorial_service.yaml

  # Phase 5b: Publications — legend note + entries
  # Author notation: **Bold** = Marine A. Denolle (PI); *Italic* = mentored students/postdocs.
    publications_legend:
      - label: Author Notation
        details: >-
          **Bold**: Marine A. Denolle (PI).
          *Italic*: graduate students, postdocs, and undergraduate students mentored by MD.
    publications: !include publications_section.yaml

  # Phase 6: Grants & Funding
    grants: !include grant_support.yaml

  # Phase 7: Research Products (Textbook, Software, Datasets)
    research_products: !include research_products.yaml

  # Phase 8: Invited Talks & Conference Presentations
    invited_talks: !include invited_talks.yaml

# ==============================================================================
# DESIGN CONFIGURATION — same visual style as the full CV
# ==============================================================================
design:
  theme: moderncv
  page:
    size: us-letter
    top_margin: 0.7in
    bottom_margin: 0.7in
    left_margin: 0.3in
    right_margin: 0.7in
  sections:
    space_between_regular_entries: 0.6em
  colors:
    name: rgb(128, 0, 0)
    section_titles: rgb(69, 128, 179)
    connections: rgb(0, 0, 0)
    links: rgb(0, 79, 144)
  typography:
    font_family:
      body: 'Libertinus Serif'
      section_titles: 'Open Sans'
    font_size:
      body: 10pt
      section_titles: 1.4em
  templates:
    single_date: YEAR
    education_entry:
      main_column: "**INSTITUTION** AREA\nSUMMARY\nHIGHLIGHTS"
      date_and_location_column: "DATE"
